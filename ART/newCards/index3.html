    <title>9 Rote Karten mit Overlay</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 300px);
            grid-template-rows: repeat(3, 400px);
            gap: 20px;
            padding: 20px;
        }
        svg {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .image-container {
            position: relative;
            width: 280px;
            height: 133px;
        }
        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .image-container svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

    <div class="grid">
        <!-- Karte 1 -->
        <svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="300" height="400" fill="#ff0000" rx="10" ry="10"/>
            <text x="150" y="40" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">Titel 1</text>
            <foreignObject x="10" y="60" width="280" height="133">
                <div class="image-container" xmlns="http://www.w3.org/1999/xhtml">
                    <img src="bild.jpg" preserveAspectRatio="xMidYMid meet"/>
                    <svg viewBox="0 0 280 133" preserveAspectRatio="xMidYMid meet">
                        <image href="overlay.svg" width="280" height="133"/>
                    </svg>
                </div>
            </foreignObject>
            <foreignObject x="10" y="200" width="280" height="190">
                <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; background-color: rgba(255,255,255,0.1); padding: 10px; color: white; font-family: Arial; font-size: 14px; overflow: auto;">
                    Karten-Text
                </div>
            </foreignObject>
        </svg>
