Obwohl das HackersCardgame.org heisst ist das KEIN SPIEL. Es sind Lernkarten welche Euch jüngeren Menschen, Menschinnen und Menschies die miesen Schachzüge älterer Generationen verraten sollen. Mit diesem Wissen kann man Euch weniger versklaven und ausbeuten, egal ob wirtschaftlich oder sexuell.

Ich will damit NIEMANDEN Missionieren und ich lehne auch ältere Opfer ab welche dann einfach versuchen jüngere Menschen als Kanonen gegen deren eigenen Feinde zu missbrauchen.

Wie der Fuchs ohne Gewehr ist es besser sich vor dem Jäger zu verstecken. Und im Rotkäppchen ist der Jäger schon der grosse Held welcher die pädokriminelle Grossmutter vor dem Wolf rettet, und auch das Kinderlied "Fuchs DU hast die Gans gestohlen" suggeriert ähnliches, ABER Fragt mal Bambi was es vom Jäger hält.
